<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Church Slides + Live Chat</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Fullscreen optimizations */
    html:fullscreen {
      background: #000;
    }

    html:-webkit-full-screen {
      background: #000;
    }

    html:-ms-fullscreen {
      background: #000;
    }

    /* Hide browser UI elements in fullscreen */
    html:fullscreen body {
      background: #000;
    }

    html:-webkit-full-screen body {
      background: #000;
    }

    html:-ms-fullscreen body {
      background: #000;
    }

    iframe {
      border: none;
      margin: 0;
      padding: 0;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      filter: none;
      transform: translateZ(0);
      backface-visibility: hidden;
      will-change: transform;
      outline: none;
      box-sizing: border-box;
      zoom: 1;
      -webkit-zoom: 1;
      -moz-zoom: 1;
      -webkit-font-smoothing: subpixel-antialiased;
      font-smooth: never;
      background: #000;
      display: block;
    }

    /* Improve text rendering for slides - enhanced for crisp display */
    #slides {
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #000;
      border: none;
      outline: none;
      -webkit-overflow-scrolling: touch;
      overflow: hidden;
      filter: none;
      transform: translateZ(0);
      backface-visibility: hidden;
      perspective: 1000px;
      -webkit-transform: translateZ(0);
      -moz-transform: translateZ(0);
      -ms-transform: translateZ(0);
      will-change: transform;
      zoom: 1;
      -webkit-zoom: 1;
      -moz-zoom: 1;
    }



    /* ✅ Fullscreen slides - 80% width on the left side, no gaps */
    #slides {
      position: fixed;
      top: 0;
      left: 0;
      width: 80vw;
      height: 100vh;
      z-index: 1;
      background: #000;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      filter: none;
      transform: translateZ(0);
      backface-visibility: hidden;
      perspective: 1000px;
      will-change: transform;
      -webkit-transform: translateZ(0);
      -moz-transform: translateZ(0);
      -ms-transform: translateZ(0);
      margin: 0;
      padding: 0;
      border: none;
      outline: none;
      zoom: 1;
      -webkit-zoom: 1;
      -moz-zoom: 1;
      -webkit-font-smoothing: subpixel-antialiased;
      font-smooth: never;
      object-fit: cover;
      object-position: center;
    }

    /* ✅ Chat container - 20% width on the right side */
    #chat-container {
      position: fixed;
      top: 0;
      right: 0;
      width: 20vw;
      height: 100vh;
      z-index: 3;
      background: rgba(0, 0, 0, 0.9);
      border-left: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: -2px 0 20px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      border-radius: 0;
      pointer-events: auto;
    }

    #chat-container iframe {
      width: 100%;
      height: 100%;
      pointer-events: auto;
    }

    #player {
      position: fixed;
      top: 0;
      right: 0;
      width: 80vw;
      height: 100vh;
      z-index: 0;
      display: none;
    }

    #toggleBtn, #fullscreenBtn {
      position: fixed;
      top: 10px;
      z-index: 4;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 1;
      visibility: visible;
    }

    /* Hide buttons in fullscreen mode */
    html:fullscreen #toggleBtn,
    html:fullscreen #fullscreenBtn,
    html:-webkit-full-screen #toggleBtn,
    html:-webkit-full-screen #fullscreenBtn,
    html:-ms-fullscreen #toggleBtn,
    html:-ms-fullscreen #fullscreenBtn {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #toggleBtn {
      left: 10px;
    }

    #fullscreenBtn {
      left: 120px;
    }

    #toggleBtn:hover, #fullscreenBtn:hover {
      background: rgba(0,0,0,0.9);
    }

    /* Smooth fade transitions for buttons */
    #toggleBtn, #fullscreenBtn {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body>
  <button id="toggleBtn">Show Video</button>
  <button id="fullscreenBtn">Fullscreen</button>

  <!-- ✅ Fullscreen Slides (with correct background rendering) -->
  <iframe
    id="slides"
    src="https://docs.google.com/presentation/d/1DtVgxYLknP_jBvEcmmlW0yCrn2u8TTceNMBQh__0kL8/embed?start=false&loop=false&rm=minimal"
    allowfullscreen
    frameborder="0"
  ></iframe>

  <!-- ✅ Minimized Floating Chat -->
  <div id="chat-container">
    <iframe
      src="https://chat.restream.io/embed?token=9b5dccab-d81c-457a-8801-47adc7673892&theme=dark&autoScroll=true&showTimestamp=true"
      allowfullscreen
    ></iframe>
  </div>

  <!-- ✅ Optional Video Feed -->
  <div id="player">
    <iframe
      src="https://player.restream.io/?token=fd8a057a677c4e83897fca7c7a15fc8f"
      allow="autoplay"
      allowfullscreen
      style="width:100%; height:100%;"
    ></iframe>
  </div>

  <script>
    const toggleBtn = document.getElementById('toggleBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const slides = document.getElementById('slides');
    const player = document.getElementById('player');
    const chatContainer = document.getElementById('chat-container');

    toggleBtn.onclick = () => {
      const showingVideo = player.style.display === 'block';
      player.style.display = showingVideo ? 'none' : 'block';
      slides.style.zIndex = showingVideo ? 1 : 0;
      toggleBtn.textContent = showingVideo ? 'Show Video' : 'Show Slides';
    };

    // Fullscreen functionality
    fullscreenBtn.onclick = () => {
      if (!document.fullscreenElement) {
        // Enter fullscreen
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen();
        } else if (document.documentElement.webkitRequestFullscreen) {
          document.documentElement.webkitRequestFullscreen();
        } else if (document.documentElement.msRequestFullscreen) {
          document.documentElement.msRequestFullscreen();
        }
        fullscreenBtn.textContent = 'Exit Fullscreen';
      } else {
        // Exit fullscreen
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        fullscreenBtn.textContent = 'Fullscreen';
      }
    };

    // Listen for fullscreen changes
    document.addEventListener('fullscreenchange', updateFullscreenButton);
    document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
    document.addEventListener('msfullscreenchange', updateFullscreenButton);

    function updateFullscreenButton() {
      if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
        fullscreenBtn.textContent = 'Exit Fullscreen';
        // Hide buttons smoothly in fullscreen
        toggleBtn.style.opacity = '0';
        toggleBtn.style.visibility = 'hidden';
        toggleBtn.style.pointerEvents = 'none';
        fullscreenBtn.style.opacity = '0';
        fullscreenBtn.style.visibility = 'hidden';
        fullscreenBtn.style.pointerEvents = 'none';
      } else {
        fullscreenBtn.textContent = 'Fullscreen';
        // Show buttons when exiting fullscreen
        toggleBtn.style.opacity = '1';
        toggleBtn.style.visibility = 'visible';
        toggleBtn.style.pointerEvents = 'auto';
        fullscreenBtn.style.opacity = '1';
        fullscreenBtn.style.visibility = 'visible';
        fullscreenBtn.style.pointerEvents = 'auto';
      }
    }

    // Chat is now fixed position - no drag functionality needed
  </script>
</body>
</html>
